name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build, vet & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  portal:
    name: Portal builds from source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter entra-emulator-portal test
      - run: pnpm --filter entra-emulator-portal build
      # portal/dist is committed (go:embed bakes it into the binary so `go build`
      # / `go install @latest` need no Node). Fail if the committed copy has
      # drifted from a fresh build so it can never go stale.
      - name: Verify committed portal/dist is up to date
        run: |
          changes="$(git status --porcelain -- portal/dist)"
          if [ -n "$changes" ]; then
            echo "::error::portal/dist is stale. Run 'pnpm --filter entra-emulator-portal build' and commit portal/dist."
            echo "$changes"
            exit 1
          fi
      # Headless mount smoke: `vite build` + jsdom unit tests pass even when the
      # bundle resolves Svelte to its server build and never mounts. Only a real
      # browser catches that, so assert the built dist actually renders.
      - run: pnpm --filter entra-emulator-portal exec playwright install --with-deps chromium
      - run: pnpm --filter entra-emulator-portal smoke

  sdk-e2e:
    name: Real-SDK e2e (msal-node, MSAL Go/azidentity/.NET/Java, MSAL Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          # The TS e2e suite is standalone npm (e2e/ts); don't auto-detect the
          # root pnpm workspace for caching — pnpm isn't installed in this job.
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - run: ./e2e/run.sh ts go python dotnet java

  docker-smoke:
    name: Docker image smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/docker-smoke.sh

  samples:
    name: Samples compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false
      # Keep the copy-paste samples honest: fully build the typed Go sample
      # (catches API drift) and syntax-check the scripting samples.
      - run: go build -o /dev/null ./...
        working-directory: samples/msal-go
      - run: node --check samples/msal-node/index.mjs
      - run: python3 -m py_compile samples/msal-python/main.py
      # Compile the PDP-compat suite against the engine SDKs (no run, no Docker)
      # so API drift is caught on every push; the pdp-compat job runs it for real.
      - run: CGO_ENABLED=0 go test -tags=pdp_integration -run '^$' ./...
        working-directory: samples/externalized-authz/compat

  pdp-compat:
    name: PDP compat (${{ matrix.engine }})
    runs-on: ubuntu-latest # Docker preinstalled → testcontainers works
    strategy:
      fail-fast: false # one engine's failure must not hide the others
      matrix:
        include:
          - engine: casbin
            test: TestCasbin # in-process, no container
          - engine: openfga
            test: TestOpenFGA # ReBAC reference, via testcontainers
          - engine: spicedb
            test: TestSpiceDB # ReBAC (Zanzibar), via testcontainers
          - engine: keto
            test: TestKeto # ReBAC (Zanzibar), via testcontainers
          - engine: permify
            test: TestPermify # ReBAC (Zanzibar), via testcontainers
          - engine: opa
            test: TestOPA # Rego policy engine, in-process
          - engine: cedar
            test: TestCedar # Cedar policy engine (cedar-go), in-process
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Integration test
        working-directory: samples/externalized-authz/compat
        env:
          CGO_ENABLED: '0'
        run: go test -tags=pdp_integration -run '${{ matrix.test }}' -v ./...
