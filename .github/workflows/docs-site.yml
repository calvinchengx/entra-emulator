name: Docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/docs-site.yml'
  # Pull requests build the site as a check — the docs generator shells out to
  # git for the parity versions, so a PR that breaks it should fail here rather
  # than after merge. Build only: the deploy job is skipped below.
  pull_request:
    paths:
      - 'docs/**'
      - 'website/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/docs-site.yml'
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Starlight site
    runs-on: ubuntu-latest
    steps:
      # Full history + tags: the parity-version generator reads the map at each
      # `v*` tag (git show) and stamps the live map from `git describe`.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter entra-emulator-docs build
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name != 'pull_request'
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # PRs get the build as a check only. Deploying from a PR ref would be
    # rejected by the github-pages environment regardless.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
