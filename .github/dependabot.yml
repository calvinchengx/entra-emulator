version: 2

# Managed, grouped dependency updates. Astro and Starlight are grouped so they
# always upgrade as one compatible pair (Starlight peers a specific Astro
# major) — including majors, so security fixes that only land in a new Astro
# major aren't held back. The exact pins in package.json stay reproducible; the
# grouped PR proposes the next matched pair for CI to verify before merge.
updates:
  # pnpm workspace: root + portal + website (single root pnpm-lock.yaml).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docs-site:
        patterns: ['astro', '@astrojs/*', 'sharp']
      portal:
        patterns: ['svelte', '@sveltejs/*', 'vite']

  # Standalone TS e2e suite (its own npm project, outside the workspace).
  - package-ecosystem: npm
    directory: /e2e/ts
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      e2e-ts:
        patterns: ['*']

  # Go modules.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go:
        patterns: ['*']
  - package-ecosystem: gomod
    directory: /e2e/go
    schedule:
      interval: weekly
    groups:
      e2e-go:
        patterns: ['*']

  # GitHub Actions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
