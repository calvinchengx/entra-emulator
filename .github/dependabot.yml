version: 2

# Managed, grouped dependency updates. The docs stack (Astro/Starlight) is
# deliberately pinned for reproducible GitHub Pages builds — majors are held so
# an Astro-major bump can't land without a matching Starlight release; take them
# on purpose, not as a surprise PR.
updates:
  # pnpm workspace: root + portal + website (single root pnpm-lock.yaml).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docs-site:
        patterns: ['astro', '@astrojs/*', 'sharp']
      portal:
        patterns: ['svelte', '@sveltejs/*', 'vite']
    ignore:
      # Astro + Starlight move in lockstep; upgrade the pair manually.
      - dependency-name: 'astro'
        update-types: ['version-update:semver-major']
      - dependency-name: '@astrojs/starlight'
        update-types: ['version-update:semver-major']

  # Standalone TS e2e suite (its own npm project, outside the workspace).
  - package-ecosystem: npm
    directory: /e2e/ts
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      e2e-ts:
        patterns: ['*']

  # Go modules.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go:
        patterns: ['*']
  - package-ecosystem: gomod
    directory: /e2e/go
    schedule:
      interval: weekly
    groups:
      e2e-go:
        patterns: ['*']

  # GitHub Actions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
