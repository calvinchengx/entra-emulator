# GoReleaser builds the cross-platform release binaries. The Svelte portal is
# committed under portal/dist and embedded via go:embed, so no Node step is
# needed. Run locally with `goreleaser release --snapshot --clean`.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: entra-emulator
    main: ./cmd/entra-emulator
    binary: entra-emulator
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

# Homebrew tap: on each tag, GoReleaser generates a cask from the built macOS
# archives and commits it to calvinchengx/homebrew-tap, so `brew install
# calvinchengx/tap/entra-emulator` works. (GoReleaser deprecated formula-based
# `brews` in favor of casks for binary-only tools.) Pushing to a *separate*
# repo needs a token with write access — the default GITHUB_TOKEN can't — so a
# HOMEBREW_TAP_TOKEN secret is supplied by the release workflow. If the secret
# is absent (e.g. a fork), skip publishing rather than fail the release.
# Linux/Windows users use the release archives, `go install`, or the GHCR image.
homebrew_casks:
  - name: entra-emulator
    repository:
      owner: calvinchengx
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/calvinchengx/entra-emulator"
    description: "A local, MSAL-compatible emulator of Microsoft Entra ID (Azure AD) in a single Go binary."
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_TOKEN" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Calvin Cheng
      email: linchuan.cheng@gmail.com
    # Clear the quarantine attribute so the unsigned binary runs without a
    # Gatekeeper prompt (GoReleaser's recommended cask post-install hook).
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/entra-emulator"]
          end

# winget (Windows): on each tag, GoReleaser builds the manifest from the Windows
# archives and opens a PR against microsoft/winget-pkgs from a fork, so
# `winget install calvinchengx.entra-emulator` works. Needs a WINGET_TOKEN
# secret with write access to a calvinchengx/winget-pkgs fork; if it's absent
# (e.g. a fork of this repo, or before the fork exists) the step self-skips
# rather than failing the release. Same public-repo token constraint as the
# Homebrew tap — the default GITHUB_TOKEN can't push to another repo.
winget:
  - name: entra-emulator
    publisher: calvinchengx
    package_identifier: calvinchengx.entra-emulator
    license: Apache-2.0
    homepage: "https://github.com/calvinchengx/entra-emulator"
    short_description: "A local, MSAL-compatible emulator of Microsoft Entra ID (Azure AD) in a single Go binary."
    description: |
      Entra Emulator is a local, MSAL-compatible emulator of Microsoft Entra ID
      (Azure AD) in a single Go binary: the OIDC/OAuth 2.0 v2.0 endpoints MSAL
      talks to, a minimal read-only Microsoft Graph, and an admin REST API — so
      you can develop sign-in, token acquisition, and protected-API calls
      offline with no cloud tenant. Local development tool only.
    release_notes_url: "https://github.com/calvinchengx/entra-emulator/releases/tag/{{ .Tag }}"
    tags:
      - entra
      - azure-ad
      - oidc
      - oauth2
      - msal
      - emulator
    repository:
      owner: calvinchengx
      name: winget-pkgs
      branch: "entra-emulator-{{ .Version }}"
      token: '{{ index .Env "WINGET_TOKEN" }}'
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    skip_upload: '{{ if index .Env "WINGET_TOKEN" }}false{{ else }}true{{ end }}'

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
