name: entra_emulator_e2e
description: "Flutter e2e app for the Entra Emulator: automated device-code integration test + manual flutter_appauth sign-in screen."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_appauth: ^12.0.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
